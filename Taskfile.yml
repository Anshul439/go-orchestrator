version: "3"

dotenv:
  - .env

tasks:
  test:
    desc: Run all tests sequentially (required — integration and e2e tests share a local DB)
    cmds:
      - go test -p 1 -timeout 120s ./...

  test:unit:
    desc: Run unit tests only (no Postgres or Redis required)
    cmds:
      - go test ./internal/workflow/... ./internal/server/...

  test:integration:
    desc: Run DB integration and relay tests (requires Postgres)
    cmds:
      - go test -p 1 ./internal/db/... ./internal/outbox/...

  test:e2e:
    desc: Run end-to-end tests (requires Postgres + Redis)
    cmds:
      - go test -timeout 120s ./e2e/...

  server:
    desc: Start the gRPC server
    cmds:
      - go run ./cmd/server

  worker:
    desc: Start the worker process
    cmds:
      - go run ./cmd/worker

  dev:server:
    desc: Start server with hot reload
    cmds:
      - air -c configs/air.server.toml

  dev:worker:
    desc: Start worker with hot reload
    cmds:
      - air -c configs/air.worker.toml

  fmt:
    desc: Format Go code
    cmds:
      - go fmt ./...

  docker:up:
    desc: Build images and start all services (postgres, redis, server, worker)
    cmds:
      - docker compose up --build -d

  docker:down:
    desc: Stop and remove all containers
    cmds:
      - docker compose down

  docker:logs:
    desc: Follow logs from all services
    cmds:
      - docker compose logs -f

  docker:ps:
    desc: Show running containers
    cmds:
      - docker compose ps

  proto:
    desc: Regenerate protobuf and gRPC Go files
    cmds:
      - >
        protoc --go_out=. --go_opt=paths=source_relative
        --go-grpc_out=. --go-grpc_opt=paths=source_relative
        proto/orchestrator.proto

  migrate:up:
    desc: Apply all pending database migrations
    cmds:
      - migrate -path migrations -database "$DB_URL" up

  migrate:down:
    desc: Roll back the most recent migration
    cmds:
      - migrate -path migrations -database "$DB_URL" down 1

  migrate:version:
    desc: Show the current migration version
    cmds:
      - migrate -path migrations -database "$DB_URL" version

  migrate:create:
    desc: Create a new sequential SQL migration
    requires:
      vars: [NAME]
    cmds:
      - migrate create -ext sql -dir migrations -seq "{{.NAME}}"

  cli:submit:
    desc: Submit a shell job (e.g. task cli:submit PAYLOAD='{"command":"echo hello"}')
    requires:
      vars: [PAYLOAD]
    vars:
      RETRIES: '{{default "0" .RETRIES}}'
    cmds:
      - go run ./cmd/cli submit --type=shell --payload='{{.PAYLOAD}}' --retries={{.RETRIES}}

  cli:status:
    desc: Check job status
    requires:
      vars: [ID]
    cmds:
      - go run ./cmd/cli status {{.ID}}

  cli:list:
    desc: List jobs (optional STATUS filter)
    vars:
      STATUS: '{{default "" .STATUS}}'
    cmds:
      - go run ./cmd/cli list --status={{.STATUS}}

  cli:cancel:
    desc: Cancel a job by ID
    requires:
      vars: [ID]
    cmds:
      - go run ./cmd/cli cancel {{.ID}}

  workflow:list:
    desc: List all registered workflows
    cmds:
      - go run ./cmd/cli workflow list

  workflow:trigger:
    desc: Trigger a workflow by name
    requires:
      vars: [NAME]
    cmds:
      - go run ./cmd/cli workflow trigger {{.NAME}}

  workflow:status:
    desc: Get workflow run status
    requires:
      vars: [ID]
    cmds:
      - go run ./cmd/cli workflow status {{.ID}}