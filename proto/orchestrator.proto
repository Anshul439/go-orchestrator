syntax = "proto3";

package orchestrator;

option go_package = "github.com/anshul439/go-orchestrator/proto";

message SubmitJobRequest {
  int32  max_retries = 1;
  string type        = 2;
  string payload     = 3;
}

message SubmitJobResponse {
  int32 job_id = 1;
}

message GetJobRequest {
  int32 job_id = 1;
}

message GetJobResponse {
  int32  job_id      = 1;
  string status      = 2;
  int32  retry_count = 3;
  int32  max_retries = 4;
  string type        = 5;
  string payload     = 6;
}

message ListJobsRequest {
  string status = 1; // optional filter — empty means all jobs
}

message ListJobsResponse {
  repeated GetJobResponse jobs = 1;
}

message CancelJobRequest {
  int32 job_id = 1;
}

message CancelJobResponse {
  int32  job_id = 1;
  string status = 2; // "cancelled"
}

message ReadySignal {}

message TaskResult {
  int32  job_id  = 1;
  bool   success = 2;
  string error   = 3; // populated if success=false
}

message WorkerMessage {
  string worker_id = 1;
  oneof payload {
    ReadySignal ready  = 2;
    TaskResult  result = 3;
  }
}

message TaskAssignment {
  int32  job_id      = 1;
  string type        = 2;
  string payload     = 3;
  int32  retry_count = 4;
  int32  max_retries = 5;
}

message ServerMessage {
  oneof payload {
    TaskAssignment task = 1;
  }
}

message TriggerWorkflowRequest {
  string name = 1;
}

message TriggerWorkflowResponse {
  int32 run_id = 1;
}

message ListWorkflowsRequest {}

message WorkflowInfo {
  string name       = 1;
  int32  step_count = 2;
}

message ListWorkflowsResponse {
  repeated WorkflowInfo workflows = 1;
}

message GetWorkflowStatusRequest {
  int32 run_id = 1;
}

message GetWorkflowStatusResponse {
  int32  run_id        = 1;
  string workflow_name = 2;
  string status        = 3;
  int32  current_step  = 4;
  int32  total_steps   = 5;
}


service OrchestratorService {
  rpc SubmitJob         (SubmitJobRequest)          returns (SubmitJobResponse);
  rpc GetJob            (GetJobRequest)             returns (GetJobResponse);
  rpc ListJobs          (ListJobsRequest)           returns (ListJobsResponse);
  rpc CancelJob         (CancelJobRequest)          returns (CancelJobResponse);
  rpc TriggerWorkflow   (TriggerWorkflowRequest)    returns (TriggerWorkflowResponse);
  rpc ListWorkflows     (ListWorkflowsRequest)      returns (ListWorkflowsResponse);
  rpc GetWorkflowStatus (GetWorkflowStatusRequest)  returns (GetWorkflowStatusResponse);
  // Work is a bidirectional stream — worker sends ready/result, server sends job assignments.
  rpc Work              (stream WorkerMessage)      returns (stream ServerMessage);
}
