services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 5678
      POSTGRES_DB: orchestrator
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate:v4.17.1
    volumes:
      - ./migrations:/migrations
    command:
      - -path=/migrations
      - -database=postgres://postgres:5678@postgres:5432/orchestrator?sslmode=disable
      - up
    depends_on:
      postgres:
        condition: service_healthy

  server:
    build:
      context: .
      target: server
    environment:
      DB_URL: postgres://postgres:5678@postgres:5432/orchestrator?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      REDIS_QUEUE_NAME: jobs
      GRPC_ADDR: :50051
      WORKER_COUNT: "1"
    ports:
      - "50051:50051"
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      target: worker
    environment:
      GRPC_ADDR: server:50051
      WORKER_COUNT: "3"
    restart: unless-stopped
    depends_on:
      server:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
